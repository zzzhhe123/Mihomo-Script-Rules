# .github/workflows/lint.yml
# 作用：每次 push 时自动检查脚本语法 + 生成 yaml + 有变化则自动提交回仓库
# 触发：push 到 main 分支
name: 脚本自检与 YAML 自动同步

on:
  push:
    branches: [main]
    paths:
      - 'Mihomo-Script-Rules.js'  # 只有脚本本身改动才触发完整流程
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 Actions 提交回仓库
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史才能正确提交

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 语法检查 (node --check)
        run: node --check Mihomo-Script-Rules.js

      - name: 运行时功能验证
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const src = fs.readFileSync('Mihomo-Script-Rules.js', 'utf8');
            const tmp = path.join(process.cwd(), '_tmp_verify.cjs');
            fs.writeFileSync(tmp, src + '\nmodule.exports = { main };\n');
            const { main } = require(tmp);
            const config = {
              proxies: [
                { name: '🇭🇰 香港01', type: 'vmess', server: '1.1.1.1', port: 443 },
                { name: '🇯🇵 日本01', type: 'vless', server: '2.2.2.1', port: 443 },
                { name: '官网 www.expire.com', type: 'vmess', server: '0.0.0.1', port: 443 },
                { name: '香港 0.5倍', type: 'trojan', server: '1.1.1.2', port: 443 },
              ],
              mode: 'rule',
            };
            const out = main(config);
            if (!out.proxies || !out['proxy-groups'] || !out.rules) throw new Error('输出缺少必要字段');
            console.log('✅ 验证通过');
            console.log('   proxies:', out.proxies.length);
            console.log('   proxy-groups:', out['proxy-groups'].length);
            console.log('   rules:', out.rules.length);
            fs.unlinkSync(tmp);
          "

      - name: 生成 mihomoConfig.yaml
        run: node generate-yaml.cjs

      - name: 检查 yaml 是否有变化，有则自动提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Config/mihomoConfig.yaml; then
            echo "yaml 无变化，跳过提交"
          else
            echo "yaml 有变化，自动提交"
            git add Config/mihomoConfig.yaml
            git commit -m "chore: 自动同步 mihomoConfig.yaml [skip ci]"
            git push
          fi
